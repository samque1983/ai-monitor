<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI 领航 — AI 领航员</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808; --surface: #101010; --surface-2: #181818;
  --border: rgba(255,255,255,0.08); --border-2: rgba(255,255,255,0.05);
  --text: #ececec; --text-2: rgba(236,236,236,0.60); --text-3: rgba(236,236,236,0.38);
  --red: #ff453a; --amber: #ffb340; --green: #34c759; --blue: #0a84ff;
  --r4: 4px; --r8: 8px; --r12: 12px;
}
html, body { height: 100%; }
body {
  font-family: "DM Sans", -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.chat-scroll {
  flex: 1; overflow-y: auto;
  padding: 20px 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.chat-msg {
  max-width: 80%; padding: 10px 14px;
  border-radius: var(--r12); font-size: 13px; line-height: 1.55;
}
.chat-msg.user {
  align-self: flex-end; background: var(--blue); color: #fff;
  border-radius: var(--r12) var(--r12) var(--r4) var(--r12);
}
.chat-msg.ai {
  align-self: flex-start; background: var(--surface); color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r4) var(--r12) var(--r12) var(--r12);
}
.chat-ai-label {
  font-family: "DM Mono", monospace; font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--amber); margin-bottom: 5px;
}
.chat-input-bar {
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  background: var(--bg); border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 14px;
  font-size: 13px; font-family: "DM Sans", sans-serif;
  color: var(--text); outline: none; transition: border-color 0.15s;
}
.chat-input:focus { border-color: rgba(255,179,64,0.4); }
.chat-input::placeholder { color: var(--text-3); }
.chat-send {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--amber); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.15s;
}
.chat-send:hover { opacity: 0.85; }
.main-content {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  padding-bottom: 0 !important;
}
@media (min-width: 1024px) {
  .chat-input-bar { padding-bottom: 14px; }
}
</style>
</head>
<body>
<div class="app-shell">
  {% include "_nav.html" %}
  <main class="main-content">
    <div class="chat-wrap">
      <div class="chat-scroll" id="chat-messages">
        <div class="chat-msg ai">
          <div class="chat-ai-label">领航员 · AI</div>
          你好，我是 AI 领航员。我可以帮你分析市场信号、讨论期权策略、或解读你的持仓风险。有什么想聊的？
        </div>
      </div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-input" placeholder="问领航员..." type="text" autocomplete="off">
        <button class="chat-send" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>
<script>
async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const msgs = document.getElementById('chat-messages');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-msg user';
  userBubble.textContent = text;
  msgs.appendChild(userBubble);
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, user_id: 'web'}),
    });
    const data = await resp.json();
    const aiBubble = document.createElement('div');
    aiBubble.className = 'chat-msg ai';
    aiBubble.innerHTML = '<div class="chat-ai-label">领航员 · AI</div>' + (data.reply || '抱歉，暂时无法回答。');
    msgs.appendChild(aiBubble);
  } catch (e) {
    const errBubble = document.createElement('div');
    errBubble.className = 'chat-msg ai';
    errBubble.innerHTML = '<div class="chat-ai-label">系统</div>连接失败，请稍后重试。';
    msgs.appendChild(errBubble);
  }
  msgs.scrollTop = msgs.scrollHeight;
}
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
</script>
</body>
</html>
