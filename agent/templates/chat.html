<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI 领航 — AI 领航员</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #111118; --surface: #1c1c2a; --surface-2: #262636;
  --border: rgba(255,255,255,0.12); --border-2: rgba(255,255,255,0.09);
  --text: #f0f0f8; --text-2: rgba(210,210,230,0.88); --text-3: rgba(210,210,230,0.75);
  --red: #f84960; --amber: #f7a600; --green: #02c076; --blue: #2e86de;
  --r4: 4px; --r8: 8px; --r12: 12px;
  --amber-dim: rgba(255,179,64,0.12);
}
html, body { height: 100%; }
body {
  font-family: "DM Sans", -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── App shell override for full-height chat ── */
.main-content {
  display: flex; flex-direction: row;
  height: 100vh; overflow: hidden;
  padding: 0 !important; max-width: none !important;
}

/* ── Profile panel (left) ── */
.profile-panel {
  width: 200px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 14px; gap: 14px; overflow-y: auto;
}
.profile-eyebrow {
  font-family: "DM Mono", monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3);
}
.profile-name {
  font-family: "Instrument Serif", Georgia, serif; font-style: italic;
  font-size: 18px; color: var(--text); line-height: 1.2;
}
.profile-summary {
  font-size: 12px; color: var(--text-3); line-height: 1.6;
}
.profile-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.profile-tag {
  font-family: "DM Mono", monospace; font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em; padding: 2px 7px; border-radius: 8px;
  background: var(--amber-dim); color: var(--amber);
  border: 1px solid rgba(255,179,64,0.25); cursor: pointer;
  transition: background 0.15s;
}
.profile-tag:hover { background: rgba(255,179,64,0.22); }
.profile-risk {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-3);
}
.profile-risk-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.profile-risk-dot.conservative { background: var(--green); }
.profile-risk-dot.moderate { background: var(--amber); }
.profile-risk-dot.aggressive { background: var(--red); }

/* ── Chat center ── */
.chat-center {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; height: 100%;
}
.quick-bar {
  padding: 8px 14px;
  display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
  border-bottom: 1px solid var(--border-2);
}
.quick-chip {
  font-size: 11px; color: var(--text-2);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 4px 11px; cursor: pointer;
  font-family: "DM Sans", sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.quick-chip:hover { background: var(--surface-2); border-color: rgba(255,255,255,0.2); }
.chat-scroll {
  flex: 1; overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg {
  max-width: 82%; padding: 10px 14px;
  border-radius: var(--r12); font-size: 13px; line-height: 1.6;
}
.chat-msg.user {
  align-self: flex-end; background: var(--blue); color: #fff;
  border-radius: var(--r12) var(--r12) var(--r4) var(--r12);
}
.chat-msg.ai {
  align-self: flex-start; background: var(--surface); color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r4) var(--r12) var(--r12) var(--r12);
}
.chat-ai-label {
  font-family: "DM Mono", monospace; font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--amber); margin-bottom: 5px;
}
.chat-typing {
  align-self: flex-start; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r4) var(--r12) var(--r12) var(--r12);
  display: flex; gap: 4px; align-items: center;
}
.chat-typing span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--text-3);
  animation: blink 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; }
}
.chat-input-bar {
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  background: var(--bg); border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 14px;
  font-size: 13px; font-family: "DM Sans", sans-serif;
  color: var(--text); outline: none; transition: border-color 0.15s;
}
.chat-input:focus { border-color: rgba(255,179,64,0.4); }
.chat-input::placeholder { color: var(--text-3); }
.chat-send {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--amber); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.15s;
}
.chat-send:hover { opacity: 0.85; }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Opportunity cards ── */
.cards-row {
  display: flex; flex-direction: column; gap: 6px; margin-top: 8px;
}
.opp-card {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r8); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.opp-ticker {
  font-family: "DM Mono", monospace; font-size: 13px; font-weight: 600;
  color: var(--text); min-width: 60px;
}
.opp-signal {
  font-family: "DM Mono", monospace; font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; padding: 2px 6px; border-radius: 6px;
  background: var(--amber-dim); color: var(--amber);
  border: 1px solid rgba(255,179,64,0.25); text-transform: uppercase;
}
.opp-meta { flex: 1; font-size: 11px; color: var(--text-3); font-family: "DM Mono", monospace; }
.opp-add {
  font-size: 11px; color: var(--amber); background: transparent;
  border: 1px solid rgba(255,179,64,0.3); border-radius: var(--r4);
  padding: 3px 8px; cursor: pointer; font-family: "DM Sans", sans-serif;
  transition: background 0.15s;
}
.opp-add:hover { background: var(--amber-dim); }

/* ── Tool drawer (right) ── */
.tool-drawer {
  width: 220px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.drawer-header {
  padding: 14px 14px 8px;
  font-family: "DM Mono", monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3);
  border-bottom: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-toggle {
  cursor: pointer; color: var(--text-3); background: none; border: none;
  font-size: 12px; line-height: 1; padding: 0;
  transition: color 0.15s;
}
.drawer-toggle:hover { color: var(--text); }
.drawer-scroll { flex: 1; overflow-y: auto; padding: 8px 10px; }
.signal-item {
  padding: 8px 4px; border-bottom: 1px solid var(--border-2);
  cursor: pointer; transition: background 0.12s; border-radius: var(--r4);
}
.signal-item:last-child { border-bottom: none; }
.signal-item:hover { background: var(--surface-2); }
.signal-ticker {
  font-family: "DM Mono", monospace; font-size: 12px; font-weight: 600;
  color: var(--text);
}
.signal-type {
  font-family: "DM Mono", monospace; font-size: 10px; color: var(--amber);
  margin-left: 6px;
}
.signal-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* ── Mobile ── */
@media (max-width: 1023px) {
  .profile-panel { display: none; }
  .tool-drawer { display: none; }
  .main-content { flex-direction: column; }
  .mobile-tags {
    display: flex; gap: 6px; overflow-x: auto; padding: 8px 14px;
    border-bottom: 1px solid var(--border-2); flex-shrink: 0;
    scrollbar-width: none;
  }
  .mobile-tags::-webkit-scrollbar { display: none; }
  .mobile-tag {
    font-family: "DM Mono", monospace; font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 8px; white-space: nowrap;
    background: var(--amber-dim); color: var(--amber);
    border: 1px solid rgba(255,179,64,0.25); cursor: pointer; flex-shrink: 0;
  }
}
@media (min-width: 1024px) {
  .mobile-tags { display: none; }
  .chat-input-bar { padding-bottom: 14px; }
}
</style>
</head>
<body>
<div class="app-shell">
  {% include "_nav.html" %}
  <main class="main-content">

    <!-- Left: Profile panel -->
    <aside class="profile-panel" id="profile-panel">
      <div class="profile-eyebrow">用户画像</div>
      <div class="profile-name" id="profile-name">ALICE</div>
      <div class="profile-risk" id="profile-risk">
        <span class="profile-risk-dot moderate"></span>
        <span id="profile-risk-label">稳健型</span>
      </div>
      <div class="profile-tags" id="profile-tags">
        <!-- populated by JS -->
      </div>
      <div class="profile-summary" id="profile-summary" style="display:none"></div>
    </aside>

    <!-- Center: Chat -->
    <div class="chat-center">

      <!-- Mobile profile tags -->
      <div class="mobile-tags" id="mobile-tags"></div>

      <!-- Quick chips -->
      <div class="quick-bar">
        <button class="quick-chip" onclick="sendChip('本周扫描摘要')">扫描摘要</button>
        <button class="quick-chip" onclick="sendChip('显示我的自选池')">我的自选</button>
        <button class="quick-chip" onclick="sendChip('当前有哪些高股息机会')">高股息机会</button>
        <button class="quick-chip" onclick="sendChip('分析我的持仓风险')">分析风险</button>
      </div>

      <!-- Messages -->
      <div class="chat-scroll" id="chat-messages">
        <div class="chat-msg ai">
          <div class="chat-ai-label">领航员 · AI</div>
          你好，我是 AI 领航员。我可以帮你分析市场信号、讨论期权策略、或解读你的持仓风险。有什么想聊的？
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-input" placeholder="问领航员..." type="text" autocomplete="off">
        <button class="chat-send" id="chat-send-btn" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: Tool drawer -->
    <aside class="tool-drawer" id="tool-drawer">
      <div class="drawer-header">
        最近信号
        <button class="drawer-toggle" onclick="toggleDrawer()" title="收起">✕</button>
      </div>
      <div class="drawer-scroll" id="drawer-signals">
        <div style="font-size:12px;color:var(--text-3);padding:12px 4px;">加载中…</div>
      </div>
    </aside>

  </main>
</div>

<script>
// ── Profile ──────────────────────────────────────────────────────────────────
const RISK_MAP = {conservative:'保守型', moderate:'稳健型', aggressive:'进取型'};
const RISK_DOT = {conservative:'conservative', moderate:'moderate', aggressive:'aggressive'};

async function loadProfile() {
  try {
    const data = await fetch('/api/profile').then(r => r.json());
    const p = data.profile || {};
    if (p.summary) {
      const el = document.getElementById('profile-summary');
      el.textContent = p.summary; el.style.display = '';
    }
    if (p.risk_level) {
      const dot = document.querySelector('.profile-risk-dot');
      dot.className = 'profile-risk-dot ' + (RISK_DOT[p.risk_level] || 'moderate');
      document.getElementById('profile-risk-label').textContent = RISK_MAP[p.risk_level] || p.risk_level;
    }
    if (p.strategy_tags && p.strategy_tags.length) {
      const container = document.getElementById('profile-tags');
      const mobile = document.getElementById('mobile-tags');
      container.innerHTML = '';
      mobile.innerHTML = '';
      p.strategy_tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'profile-tag'; btn.textContent = tag;
        btn.onclick = () => sendChip(`关于${tag}策略，有哪些机会？`);
        container.appendChild(btn);
        const m = document.createElement('button');
        m.className = 'mobile-tag'; m.textContent = tag;
        m.onclick = () => sendChip(`关于${tag}策略，有哪些机会？`);
        mobile.appendChild(m);
      });
    }
  } catch(e) {}
}

// ── Signals drawer ────────────────────────────────────────────────────────────
const SIGNAL_LABELS = {
  sell_put:'Sell Put', iv_low:'IV低位', leaps:'LEAPS', dividend:'高股息',
  ma200_bullish:'MA200↑', iv_high:'IV飙升', ma200_bearish:'MA200↓',
  earnings_gap:'缺口', sell_put_earnings_risk:'财报风险', iv_momentum:'IV动量'
};

async function loadSignals() {
  try {
    const data = await fetch('/api/signals?time_range=7d').then(r => r.json());
    const el = document.getElementById('drawer-signals');
    if (!data.signals || !data.signals.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--text-3);padding:12px 4px;">暂无近期信号</div>';
      return;
    }
    el.innerHTML = data.signals.slice(0, 15).map(s => `
      <div class="signal-item" onclick="sendChip('分析 ${s.ticker} 的 ${SIGNAL_LABELS[s.signal_type]||s.signal_type} 信号')">
        <div>
          <span class="signal-ticker">${s.ticker}</span>
          <span class="signal-type">${SIGNAL_LABELS[s.signal_type] || s.signal_type}</span>
        </div>
        <div class="signal-desc">${s.category === 'opportunity' ? '机会' : '风险'} · ${s.scan_date}</div>
      </div>`).join('');
  } catch(e) {}
}

let drawerOpen = true;
function toggleDrawer() {
  const drawer = document.getElementById('tool-drawer');
  drawerOpen = !drawerOpen;
  drawer.style.display = drawerOpen ? '' : 'none';
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function appendUserMsg(text) {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg user';
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function appendTyping() {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function renderCards(cards) {
  if (!cards || !cards.length) return '';
  const items = cards.map(c => {
    const meta = [
      c.yield != null ? `股息率 ${(+c.yield).toFixed(1)}%` : '',
      c.iv_rank != null ? `IV Rank ${c.iv_rank}` : '',
      c.last_price != null ? `$${(+c.last_price).toFixed(2)}` : '',
    ].filter(Boolean).join('  ');
    const signal = (c.signal||'').replace(/_/g,' ').toUpperCase();
    return `
    <div class="opp-card">
      <span class="opp-ticker">${esc(c.ticker)}</span>
      <span class="opp-signal">${esc(signal)}</span>
      <span class="opp-meta">${esc(meta)}</span>
      <button class="opp-add" onclick="addToWatchlist('${esc(c.ticker)}')">+ 自选</button>
    </div>`;
  }).join('');
  return `<div class="cards-row">${items}</div>`;
}

function appendAIMsg(reply, cards, profileUpdated) {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg ai';
  el.innerHTML = `<div class="chat-ai-label">领航员 · AI${profileUpdated ? ' · 画像已更新' : ''}</div>`
    + esc(reply).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')
    + renderCards(cards);
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send-btn');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.disabled = true; btn.disabled = true;
  appendUserMsg(text);
  const typing = appendTyping();
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, user_id: 'ALICE'}),
    });
    const data = await resp.json();
    typing.remove();
    appendAIMsg(data.reply || '抱歉，暂时无法回答。', data.cards, data.profile_updated);
    if (data.profile_updated) loadProfile();
  } catch(e) {
    typing.remove();
    appendAIMsg('连接失败，请稍后重试。', [], false);
  }
  inp.disabled = false; btn.disabled = false;
  inp.focus();
}

function sendChip(text) {
  document.getElementById('chat-input').value = text;
  sendMsg();
}

async function addToWatchlist(ticker) {
  try {
    await fetch('/api/watchlist/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ticker}),
    });
    sendChip(`已将 ${ticker} 加入自选，确认一下`);
  } catch(e) {}
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

loadProfile();
loadSignals();
</script>
</body>
</html>
