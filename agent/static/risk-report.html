<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>仓位风险报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808; --surface: #101010; --surface-2: #181818;
  --border: rgba(255,255,255,0.08); --text: #ececec;
  --text-2: rgba(236,236,236,0.60); --text-3: rgba(236,236,236,0.42);
  --red: #ff453a; --amber: #ffb340; --green: #34c759; --blue: #0a84ff;
}
body {
  font-family: "DM Sans", -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; min-height: 100vh;
}
.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 24px 0; position: fixed; top: 0; left: 0; height: 100vh;
}
.sidebar-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--text-3); text-transform: uppercase;
  padding: 0 20px; margin-bottom: 16px;
}
.sidebar-link {
  display: block; padding: 9px 20px; color: var(--text-2);
  text-decoration: none; font-size: 14px; transition: background 0.15s, color 0.15s;
}
.sidebar-link:hover { background: var(--surface-2); color: var(--text); }
.sidebar-link.active { color: var(--blue); background: rgba(10,132,255,0.08); }
.main { margin-left: 200px; flex: 1; padding: 32px 28px; max-width: 960px; }
.toolbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  flex-wrap: wrap;
}
.toolbar h1 { font-size: 20px; font-weight: 600; flex: 1; }
.account-select, .date-select {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 6px 12px;
  font-size: 13px; cursor: pointer; outline: none;
}
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text-3);
  font-size: 14px; line-height: 1.8;
}
#report-container { width: 100%; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-title">导航</div>
  <a class="sidebar-link" href="/dashboard">市场雷达</a>
  <a class="sidebar-link active" href="/risk-report">仓位风险报告</a>
</nav>

<main class="main">
  <div class="toolbar">
    <h1>仓位风险报告</h1>
    <select class="account-select" id="accountSelect" onchange="loadReport()">
      <option value="ALICE">ALICE</option>
    </select>
    <select class="date-select" id="dateSelect" onchange="loadReportByDate()">
      <option value="">最新</option>
    </select>
  </div>

  <div id="report-container">
    <div class="empty-state" id="emptyState">
      正在加载…
    </div>
  </div>
</main>

<script>
async function loadReport(date) {
  const account = document.getElementById('accountSelect').value;
  const dateParam = date ? `&date=${date}` : '';
  const resp = await fetch(`/api/risk-report/latest?account=${account}${dateParam}`);
  const data = await resp.json();

  const sel = document.getElementById('dateSelect');
  sel.innerHTML = '<option value="">最新</option>';
  (data.dates || []).forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    if (d === (date || data.report?.report_date)) opt.selected = true;
    sel.appendChild(opt);
  });

  const container = document.getElementById('report-container');
  if (!data.report) {
    container.innerHTML = `<div class="empty-state">
      尚无报告。<br>请在本地运行：<br>
      <code style="font-size:12px;color:#636366">python local/ibgateway_poller.py</code>
    </div>`;
    return;
  }

  let html = data.report.html_content;
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  const styleMatch = html.match(/<style[^>]*>([\s\S]*?)<\/style>/ig);
  let content = bodyMatch ? bodyMatch[1] : html;
  let styles = styleMatch ? styleMatch.join('\n') : '';
  container.innerHTML = styles + content;
}

function loadReportByDate() {
  const date = document.getElementById('dateSelect').value;
  loadReport(date || undefined);
}

loadReport();
</script>
</body>
</html>
