# fly.toml
app = "trading-agent"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.agent"

[env]
  AGENT_DB_PATH = "/data/agent.db"
  CLAUDE_MODEL = "claude-opus-4-6"

[mounts]
  source = "agent_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
