# fly.toml
app = "ai-monitor"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.agent"

[env]
  AGENT_DB_PATH = "/data/agent.db"
  CLAUDE_MODEL = "claude-opus-4-6"

[[mounts]]
  source = "agent_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
