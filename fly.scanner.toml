# fly.scanner.toml — Quant Radar scanner worker
app = "ai-monitor-scanner"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  # Use public HTTPS URL to reach the agent
  AGENT_URL    = "https://ai-monitor.fly.dev"
  # Override local relative paths to use the persistent volume
  DIVIDEND_DB_PATH = "/data/dividend_pool.db"
  IV_DB_PATH       = "/data/iv_history.db"
  LOG_DIR          = "/data/logs"
  REPORTS_DIR      = "/data/reports"
  FORCE_WEEKLY_RESCAN = "1"

[[mounts]]
  source      = "scanner_data"
  destination = "/data"

# No [http_service] — this is a one-shot worker, not a web app
