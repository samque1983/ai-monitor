name: Daily Quant Scan

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily (10:00 HKT)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  scan:
    name: Run scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Start scanner machine
        run: |
          MACHINE_ID=$(flyctl machine list --app ai-monitor-scanner 2>&1 | grep -E '^[a-f0-9]{14}' | awk '{print $1}')
          flyctl machine start "$MACHINE_ID" --app ai-monitor-scanner
          echo "Scanner started (machine $MACHINE_ID). Results pushed to agent when complete."
          echo "To check logs: flyctl logs --app ai-monitor-scanner"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
