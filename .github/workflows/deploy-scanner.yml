name: Deploy Scanner to Fly

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'fly.scanner.toml'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'config.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy scanner worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ai-monitor-scanner
        run: flyctl deploy --config fly.scanner.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
