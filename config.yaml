# V1.9 Quant Radar Configuration

csv_url: "https://docs.google.com/spreadsheets/d/1O_txXYVAcDp0syjexAcowRRdrNX4gyrFzrGqNgh9dfw/export?format=csv"

ibkr:
  host: "127.0.0.1"
  port: 4001
  client_id: 1
  timeout: 30

data:
  iv_history_db: "data/iv_history.db"
  price_period: "1y"
  earnings_csv_path: "data/earnings_calendar.csv"
  dividend_db_path: "data/dividend_pool.db"

scanners:
  iv_momentum_threshold: 30
  earnings_gap_days: 3
  earnings_lookback: 8

dividend_scanners:
  enabled: false               # 设为 true 启用高股息防御双打扫描
  min_quality_score: 70        # 最低质量评分
  min_consecutive_years: 5     # 最低连续派息年限
  max_payout_ratio: 100        # 最大派息率 (%)
  min_yield: 4.0               # 最低股息率触发阈值 (%)
  min_yield_percentile: 90     # 5年历史分位数触发阈值
  option:
    enabled: false             # 是否生成 Sell Put 期权策略
    target_strike_percentile: 90
    min_dte: 45
    max_dte: 90


reports:
  output_dir: "reports"
  log_dir: "logs"

schedule:
  timezone: "Asia/Shanghai"
  run_time: "17:00"
